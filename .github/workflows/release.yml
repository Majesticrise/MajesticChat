name: Build and Release MajesticChat

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller -D -n MajesticChat `
            --uac-admin `
            --console `
            --hidden-import=sqlite3 `
            --hidden-import=chat_config `
            --hidden-import=chat_node `
            --hidden-import=easytier_utils `
            --hidden-import=chat_main `
            --add-data "easytier-core.exe;." `
            --add-data "easytier-cli.exe;." `
            chat_main.py

      - name: Compress build folder
        run: Compress-Archive -Path dist/MajesticChat/* -DestinationPath MajesticChat.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MajesticChat.zip